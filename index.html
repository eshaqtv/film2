<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>عشاق الافلام</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0a0c10;
            color: #eef2ff;
            overflow-x: hidden;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 25px 30px;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            gap: 15px;
        }

        .page-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to left, #f5f7fe, #cbd5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-block;
        }
        .page-title h1:hover {
            opacity: 0.8;
        }

        .page-title p {
            color: #8f9bb3;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .search-box {
            background: #1a1e2a;
            padding: 8px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #2d3345;
        }

        .search-box i {
            color: #ff9f4a;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #eef2ff;
            font-family: 'Cairo', sans-serif;
            width: 220px;
        }

        .search-box input::placeholder {
            color: #6a6f86;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 22px;
            margin-top: 20px;
        }

        .anime-card {
            background: #141824;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        .anime-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 140, 66, 0.4);
            box-shadow: 0 22px 28px -14px rgba(0, 0, 0, 0.6);
            background: #1b212e;
        }

        .card-img {
            position: relative;
            width: 100%;
            padding-top: 130%;
            overflow: hidden;
            background: #0b0e16;
        }

        .card-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .anime-card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-info {
            padding: 14px 8px 12px;
            text-align: center;
        }

        .card-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #f0f3ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 6px;
        }

        .badge {
            background: rgba(255, 140, 66, 0.2);
            color: #ffb347;
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 500;
        }

        .play-hint {
            opacity: 0;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff8c42e6;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.2s;
            pointer-events: none;
            color: #0a0c10;
        }

        .anime-card:hover .play-hint {
            opacity: 1;
        }

        .footer-note {
            margin-top: 50px;
            text-align: center;
            color: #5a6b8c;
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 25px;
        }

        /* الهواتف: 4 بطاقات في السطر */
        @media (max-width: 780px) {
            .main-content {
                padding: 20px 12px;
            }
            .anime-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }
            .card-info h3 {
                font-size: 0.7rem;
            }
            .badge {
                font-size: 0.55rem;
                padding: 2px 6px;
            }
            .play-hint {
                font-size: 0.6rem;
                padding: 3px 8px;
            }
            .page-title h1 {
                font-size: 1.4rem;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input {
                width: 100%;
            }
        }

        @media (max-width: 500px) {
            .anime-grid {
                gap: 8px;
            }
            .card-info {
                padding: 8px 4px;
            }
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

    // عناصر DOM

    const gridContainer = document.getElementById('animeGridContainer');
    const homeLink = document.getElementById('homeLink');

    // تعطيل استعادة التمرير التلقائي من المتصفح للتحكم اليدوي
    if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
    }

    // حفظ واسترجاع موضع التمرير
    function saveScrollPosition() {
        const scrollY = window.scrollY;
        sessionStorage.setItem('animeScrollPos', scrollY);
    }

    function restoreScrollPosition() {
        const savedPos = sessionStorage.getItem('animeScrollPos');
        if (savedPos !== null && !isNaN(parseInt(savedPos))) {
            window.scrollTo(0, parseInt(savedPos));
            sessionStorage.removeItem('animeScrollPos');
        }
    }

    // حفظ الموضع قبل مغادرة الصفحة (لأي سبب)
    window.addEventListener('beforeunload', () => {
        saveScrollPosition();
    });

    // حفظ الموضع عند النقر على الأنمي (لضمان الدقة)
    function attachCardListeners() {
        document.querySelectorAll('.anime-card').forEach(card => {
            card.removeEventListener('click', handleCardClick);
            card.addEventListener('click', handleCardClick);
        });
    }

    function handleCardClick(e) {
        const link = this.getAttribute('data-link');
        if (link) {
            saveScrollPosition();   // حفظ الموضع الحالي بدقة
            window.open(link);
        }
    }

    function renderCards(filter = '') {
        const filtered = allAnime.filter(item => item.name.toLowerCase().includes(filter.toLowerCase()));
        if (!gridContainer) return;
        if (filtered.length === 0) {
            gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">⚠️ لا توجد نتائج مطابقة لـ "${filter}"</div>`;
            return;
        }
        let html = '';
        filtered.forEach(anime => {
            html += `
                <div class="anime-card" data-link="${anime.link}" data-name="${anime.name}">
                    <div class="card-img">
                        <img src="${anime.img}" alt="${anime.name}" loading="lazy" onerror="this.src='https://placehold.co/400x520?text=No+Image'">
                        <div class="play-hint"><i class="fas fa-play"></i> تشغيل</div>
                    </div>
                    <div class="card-info">
                        <h3>${anime.name}</h3>
                        <div class="badge"><i class="fas fa-tv"></i> Free</div>
                    </div>
                </div>
            `;
        });
        gridContainer.innerHTML = html;
        attachCardListeners();
    }

    // النقر على عنوان "قائمة الأنمي" يفتح go:home
    if (homeLink) {
        homeLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.open('https://play.google.com/store/apps/details?id=com.linkbox.plus.android&hl=ar');
        });
    }

    if (searchInputElem) {
        searchInputElem.addEventListener('input', (e) => renderCards(e.target.value));
    }

    // عند تحميل الصفحة: عرض البطاقات واستعادة الموضع
    window.addEventListener('load', () => {
        renderCards('');
        restoreScrollPosition();
    });

    // عند العودة من الصفحة عبر bfcache (مثل الرجوع من الرابط)
    window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
            restoreScrollPosition();
        }
    });
</script>
</body>
</html>
